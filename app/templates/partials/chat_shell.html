<!-- Shared dark-theme chat layout for Mitra, Visual agents.
     Uses Alpine.js wsChat() + WebSocket streaming. -->
<div class="h-full flex flex-col">

  <!-- ── Header ── -->
  <header style="height:56px;background:rgba(5,12,30,0.98);border-bottom:1px solid rgba(0,229,200,0.12)"
          class="shrink-0 px-6 flex items-center justify-between">
    <div class="flex items-center gap-3">
      <div style="width:8px;height:8px;background:#00e5c8;border-radius:50%;
                  animation:pulse-dot 2s ease-in-out infinite"></div>
      <span style="font-size:0.875rem;font-weight:600;color:#e8f4ff">{{ agent.name }}</span>
      <span style="color:rgba(0,229,200,0.25)">|</span>
      <span style="font-size:0.8rem;color:rgba(180,210,255,0.45)">{{ agent.description }}</span>
    </div>

    <!-- Domain switcher (Mitra only) -->
    <template x-if="typeof activeDomain !== 'undefined'">
      <div class="relative flex items-center gap-2" data-mitra-domain>

        <button @click="domainOpen = !domainOpen"
                style="display:flex;align-items:center;gap:6px;padding:5px 12px;
                       border-radius:8px;border:1px solid rgba(0,229,200,0.2);
                       background:rgba(0,229,200,0.08);font-size:11px;font-weight:600;
                       color:#00e5c8;cursor:pointer;transition:all 0.15s"
                onmouseover="this.style.borderColor='rgba(0,229,200,0.5)';this.style.background='rgba(0,229,200,0.14)'"
                onmouseout="this.style.borderColor='rgba(0,229,200,0.2)';this.style.background='rgba(0,229,200,0.08)'">
          <i data-lucide="database" style="width:11px;height:11px"></i>
          <span x-text="activeDomain"></span>
          <i data-lucide="chevron-down" style="width:11px;height:11px;transition:transform 0.2s"
             :style="domainOpen ? 'transform:rotate(180deg)' : ''"></i>
        </button>

        <!-- Dropdown -->
        <div x-show="domainOpen" x-transition
             style="position:absolute;right:0;top:calc(100% + 6px);width:220px;
                    background:rgba(8,15,32,0.98);border:1px solid rgba(0,229,200,0.2);
                    border-radius:12px;padding:8px 0;z-index:50;
                    box-shadow:0 20px 40px rgba(0,0,0,0.5)">

          <div style="padding:4px 12px 8px;font-size:9px;font-weight:700;letter-spacing:0.1em;
                      text-transform:uppercase;color:rgba(140,180,230,0.35)">
            Switch QAD Domain
          </div>

          <template x-for="d in ['10USA','INDIA','10EUR','10AUS','TEST']" :key="d">
            <button @click="setDomain(d)"
                    style="width:100%;display:flex;align-items:center;justify-content:space-between;
                           padding:7px 12px;font-size:0.825rem;background:transparent;border:none;
                           color:rgba(180,210,255,0.7);cursor:pointer;transition:all 0.15s;text-align:left"
                    onmouseover="this.style.background='rgba(0,229,200,0.06)';this.style.color='#e8f4ff'"
                    onmouseout="this.style.background='';this.style.color='rgba(180,210,255,0.7)'">
              <span x-text="d"></span>
              <i x-show="activeDomain === d" data-lucide="check"
                 style="width:12px;height:12px;color:#00e5c8"></i>
            </button>
          </template>

          <div style="border-top:1px solid rgba(0,229,200,0.1);margin-top:4px;padding:8px 10px 6px">
            <div class="flex gap-1.5">
              <input x-model="domainInput"
                     @keydown.enter.prevent="setDomain(domainInput)"
                     type="text"
                     placeholder="Custom domain…"
                     style="flex:1;border-radius:7px;border:1px solid rgba(0,229,200,0.15);
                            background:rgba(0,229,200,0.05);padding:5px 8px;font-size:11px;
                            color:#e8f4ff;outline:none;text-transform:uppercase"
                     onfocus="this.style.borderColor='rgba(0,229,200,0.5)'"
                     onblur="this.style.borderColor='rgba(0,229,200,0.15)'" />
              <button @click="setDomain(domainInput)"
                      :disabled="!domainInput.trim()"
                      style="padding:5px 10px;background:linear-gradient(135deg,#00c9ae,#00e5c8);
                             border:none;border-radius:7px;font-size:11px;font-weight:700;
                             color:#060d1a;cursor:pointer;transition:opacity 0.15s"
                      :style="domainInput.trim() ? 'opacity:1' : 'opacity:0.35;cursor:not-allowed'">
                Set
              </button>
            </div>
          </div>

        </div>
      </div>
    </template>

    {% block header_extra %}{% endblock %}
  </header>

  <!-- ── Main area ── -->
  <div class="flex-1 relative overflow-hidden" style="background:rgba(6,13,26,0.6)">

    <main class="h-full overflow-y-auto px-6 py-6" x-ref="msgs">

      <!-- ── Empty state ── -->
      <template x-if="messages.length === 0">
        <div class="max-w-3xl mx-auto" x-effect="$nextTick(() => window.lucide && lucide.createIcons())">
          <div class="text-center py-12">
            <div style="display:inline-flex;position:relative;width:60px;height:60px;
                        border-radius:16px;background:rgba(0,229,200,0.12);
                        border:1px solid rgba(0,229,200,0.3);align-items:center;
                        justify-content:center;margin-bottom:16px;
                        box-shadow:0 0 30px rgba(0,229,200,0.12)">
              <svg xmlns="http://www.w3.org/2000/svg" width="28" height="28" viewBox="0 0 24 24"
                   fill="none" stroke="#00e5c8" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
                <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/>
              </svg>
            </div>
            <h2 style="font-family:'Syne',sans-serif;font-size:1.6rem;font-weight:700;
                       color:#e8f4ff;margin-bottom:8px">
              How can I help you today?
            </h2>
            <p style="color:rgba(180,210,255,0.5);font-size:0.9rem">{{ agent.description }}</p>
          </div>

          {% if suggestions %}
          <div class="grid grid-cols-1 sm:grid-cols-2 gap-3 mt-2">
            {% for q in suggestions %}
            <button @click="send('{{ q|replace("'", "\\'") }}')"
                    style="text-align:left;background:rgba(10,20,42,0.8);
                           border:1px solid rgba(0,229,200,0.14);border-radius:14px;
                           padding:16px;cursor:pointer;transition:all 0.2s;width:100%"
                    onmouseover="this.style.borderColor='rgba(0,229,200,0.4)';this.style.background='rgba(0,229,200,0.07)';this.style.transform='translateY(-1px)'"
                    onmouseout="this.style.borderColor='rgba(0,229,200,0.14)';this.style.background='rgba(10,20,42,0.8)';this.style.transform=''">
              <div class="flex items-start gap-3">
                <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24"
                     fill="none" stroke="#00e5c8" stroke-width="2" stroke-linecap="round"
                     stroke-linejoin="round" style="margin-top:2px;flex-shrink:0;opacity:0.8">
                  <path d="M9.663 17h4.673M12 3v1m6.364 1.636-.707.707M21 12h-1M4 12H3m3.343-5.657-.707-.707m2.828 9.9a5 5 0 1 1 7.072 0l-.548.547A3.374 3.374 0 0 0 14 18.469V19a2 2 0 1 1-4 0v-.531c0-.895-.356-1.754-.988-2.386l-.548-.547z"/>
                </svg>
                <span style="font-size:0.85rem;color:rgba(180,210,255,0.75);line-height:1.5">{{ q }}</span>
              </div>
            </button>
            {% endfor %}
          </div>
          {% endif %}
        </div>
      </template>

      <!-- ── Messages ── -->
      <div class="max-w-4xl mx-auto space-y-5">
        <template x-for="(m, i) in messages" :key="i">
          <div>
            <!-- User message -->
            <template x-if="m.role === 'user'">
              <div class="flex justify-end">
                <div style="background:linear-gradient(135deg,#00c9ae,#00e5c8 60%,#0d8ef5);
                            color:#060d1a;border-radius:18px;border-bottom-right-radius:4px;
                            padding:10px 18px;max-width:85%;font-size:0.875rem;
                            font-weight:500;line-height:1.5"
                     x-text="m.text"></div>
              </div>
            </template>
            <!-- Assistant message -->
            <template x-if="m.role === 'assistant'">
              <div style="background:rgba(10,20,42,0.85);border:1px solid rgba(0,229,200,0.14);
                          border-radius:18px;border-top-left-radius:4px;padding:18px 20px;
                          box-shadow:0 4px 20px rgba(0,0,0,0.25)"
                   class="prose-container" x-html="m.html"></div>
            </template>
          </div>
        </template>

        <!-- Streaming bubble -->
        <div x-show="streaming"
             style="background:rgba(10,20,42,0.85);border:1px solid rgba(0,229,200,0.2);
                    border-radius:18px;border-top-left-radius:4px;padding:18px 20px;
                    box-shadow:0 4px 20px rgba(0,0,0,0.25)">
          <div x-show="statusText" class="flex items-center gap-2 mb-3"
               style="font-size:0.8rem;color:#00e5c8">
            <span style="display:inline-block;width:7px;height:7px;border-radius:50%;
                         background:#00e5c8;animation:pulse-dot 1.2s ease-in-out infinite"></span>
            <span x-text="statusText"></span>
          </div>
          <div class="prose-container" x-html="currentHtml"></div>
          <span style="display:inline-block;width:6px;height:16px;background:#00e5c8;
                       opacity:0.8;animation:blink 1s steps(1) infinite;
                       margin-left:2px;vertical-align:middle;border-radius:1px"></span>
        </div>

        <!-- Thinking indicator -->
        <div x-show="loading && !streaming"
             class="flex items-center gap-2"
             style="color:rgba(180,210,255,0.45);font-size:0.85rem">
          <span style="display:inline-block;width:7px;height:7px;border-radius:50%;
                       background:#00e5c8;animation:pulse-dot 1s ease-in-out infinite"></span>
          <span>Thinking...</span>
        </div>

        <div class="h-32"></div>
      </div>

    </main>

    <!-- ── Floating input ── -->
    <div class="absolute bottom-0 left-0 right-0 z-20 px-4 pb-6 pt-14"
         style="background:linear-gradient(to top, rgba(6,13,26,1) 0%, rgba(6,13,26,0.95) 60%, transparent 100%)">
      <div class="max-w-2xl mx-auto">
        {% block input_extra %}{% endblock %}
        <form @submit.prevent="send()"
              class="relative flex items-center rounded-xl px-3 py-2"
              style="background:rgba(8,15,32,0.96);
                     border:1px solid rgba(0,229,200,0.22);
                     box-shadow:0 8px 32px rgba(0,0,0,0.4),0 0 0 1px rgba(0,229,200,0.05)"
              onfocusin="this.style.borderColor='rgba(0,229,200,0.5)'"
              onfocusout="this.style.borderColor='rgba(0,229,200,0.22)'">

          <input x-model="input" type="text" data-bare
                 placeholder="Ask {{ agent.name }}..."
                 :disabled="loading"
                 style="font-size:0.875rem;padding:4px 0"
                 x-bind:style="loading ? 'opacity:0.4' : ''" />

          <button type="submit"
                  :disabled="!input.trim() || loading"
                  class="ml-2 shrink-0 flex items-center justify-center rounded-lg transition"
                  style="height:32px;width:64px;border:none;font-weight:700"
                  :style="(input.trim() && !loading)
                    ? 'background:linear-gradient(135deg,#00c9ae,#00e5c8);color:#060d1a;cursor:pointer;'
                    : 'background:rgba(0,229,200,0.12);color:rgba(0,229,200,0.3);cursor:not-allowed;'"
                  onmouseover="if(!this.disabled) this.style.opacity='0.9'"
                  onmouseout="this.style.opacity='1'">
            <i data-lucide="send" style="width:14px;height:14px"></i>
          </button>
        </form>

        <p style="text-align:center;font-size:11px;color:rgba(140,180,230,0.28);margin-top:8px">
          Apex AI can make mistakes. Please verify critical ERP modifications.
        </p>
      </div>
    </div>

  </div>

</div>

<style>
@keyframes pulse-dot {
  0%, 100% { opacity:1; transform:scale(1); }
  50% { opacity:0.4; transform:scale(0.6); }
}
@keyframes blink { 0%, 100% { opacity:1; } 50% { opacity:0; } }
</style>
