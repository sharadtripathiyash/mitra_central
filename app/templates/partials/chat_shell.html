<!-- Shared chat layout for main-area agents (Mitra, Visual, QAD-Zone).
     Uses WebSocket streaming. The parent div must set x-data with the appropriate wsChat() call. -->
<div class="h-full flex flex-col">

  <!-- ── Header (redesigned, clean text style) ── -->
  <header class="h-14 shrink-0 bg-white border-b border-slate-200 px-6 flex items-center justify-between">
    <div class="flex items-center gap-3">
      <span class="text-sm font-semibold text-slate-700">{{ agent.name }}</span>
      <span class="text-slate-300">|</span>
      <span class="text-sm text-slate-400">{{ agent.description }}</span>
    </div>

    <!-- Domain switcher — only rendered when activeDomain is available (Mitra) -->
    <template x-if="typeof activeDomain !== 'undefined'">
      <div class="relative flex items-center gap-2" data-mitra-domain>

        <!-- Current domain badge -->
        <button @click="domainOpen = !domainOpen"
                class="flex items-center gap-1.5 px-3 py-1.5 rounded-lg border border-slate-200
                       bg-slate-50 hover:bg-slate-100 text-xs font-semibold text-slate-700 transition">
          <i data-lucide="database" class="w-3 h-3 text-slate-400"></i>
          <span x-text="activeDomain"></span>
          <i data-lucide="chevron-down" class="w-3 h-3 text-slate-400 transition-transform"
             :class="domainOpen ? 'rotate-180' : ''"></i>
        </button>

        <!-- Dropdown panel -->
        <div x-show="domainOpen" x-transition
             class="absolute right-0 top-full mt-1 w-64 bg-white rounded-xl shadow-xl
                    border border-slate-200 py-2 z-50">

          <div class="px-3 py-1.5 text-[10px] font-bold uppercase tracking-wider text-slate-400">
            Switch QAD Domain
          </div>

          <!-- Quick select common domains -->
          <template x-for="d in ['10USA','INDIA','10EUR','10AUS','TEST']" :key="d">
            <button @click="setDomain(d)"
                    class="w-full flex items-center justify-between px-3 py-2 text-sm
                           text-slate-700 hover:bg-slate-50 transition">
              <span x-text="d"></span>
              <i x-show="activeDomain === d" data-lucide="check" class="w-3.5 h-3.5 text-brand-600"></i>
            </button>
          </template>

          <!-- Custom domain input -->
          <div class="border-t border-slate-100 mt-1 px-3 pt-2 pb-1">
            <div class="flex gap-1.5">
              <input x-model="domainInput"
                     @keydown.enter.prevent="setDomain(domainInput)"
                     type="text"
                     placeholder="Custom domain…"
                     class="flex-1 rounded-lg border border-slate-200 px-2 py-1.5 text-xs
                            focus:outline-none focus:ring-2 focus:ring-brand-500 uppercase" />
              <button @click="setDomain(domainInput)"
                      :disabled="!domainInput.trim()"
                      class="px-2 py-1.5 bg-brand-800 hover:bg-brand-900 disabled:opacity-40
                             text-white rounded-lg text-xs font-medium transition">
                Set
              </button>
            </div>
          </div>

        </div>
      </div>
    </template>

    {% block header_extra %}{% endblock %}
  </header>

  <!-- ── Main area ── -->
  <div class="flex-1 relative overflow-hidden">

    <main class="h-full overflow-y-auto px-6 py-6" x-ref="msgs">

      <!-- ── Empty state — original card design, original click pattern ── -->
      <template x-if="messages.length === 0">
        <div class="max-w-3xl mx-auto" x-effect="$nextTick(() => window.lucide && lucide.createIcons())">
          <div class="text-center py-10">
            <div class="inline-flex relative h-14 w-14 rounded-2xl bg-brand-800 items-center justify-center shadow-lg mb-4">
              <!-- Inline SVG — not dependent on lucide.createIcons() timing -->
              <svg xmlns="http://www.w3.org/2000/svg" class="relative z-20 w-7 h-7 text-white" viewBox="0 0 24 24"
                   fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/>
              </svg>
            </div>
            <h2 class="text-2xl font-bold text-slate-900">How can I help you today?</h2>
            <p class="text-slate-500 mt-1">{{ agent.description }}</p>
          </div>
          {% if suggestions %}
          <div class="grid grid-cols-1 sm:grid-cols-2 gap-3 mt-4">
            {% for q in suggestions %}
            <button @click="send('{{ q|replace("'", "\\'") }}')"
                    class="text-left bg-white border border-slate-200 rounded-xl p-4 hover:border-brand-400 hover:shadow-md transition">
              <div class="flex items-start gap-3">
                <svg xmlns="http://www.w3.org/2000/svg" class="w-4 h-4 text-brand-500 mt-0.5 shrink-0" viewBox="0 0 24 24"
                     fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                  <path d="M9.663 17h4.673M12 3v1m6.364 1.636-.707.707M21 12h-1M4 12H3m3.343-5.657-.707-.707m2.828 9.9a5 5 0 1 1 7.072 0l-.548.547A3.374 3.374 0 0 0 14 18.469V19a2 2 0 1 1-4 0v-.531c0-.895-.356-1.754-.988-2.386l-.548-.547z"/>
                </svg>
                <span class="text-sm text-slate-700">{{ q }}</span>
              </div>
            </button>
            {% endfor %}
          </div>
          {% endif %}
        </div>
      </template>

      <!-- ── Messages ── -->
      <div class="max-w-4xl mx-auto space-y-6">
        <template x-for="(m, i) in messages" :key="i">
          <div>
            <template x-if="m.role === 'user'">
              <div class="flex justify-end">
                <div class="bg-brand-600 text-white rounded-2xl rounded-br-sm px-5 py-3 max-w-[85%] whitespace-pre-wrap" x-text="m.text"></div>
              </div>
            </template>
            <template x-if="m.role === 'assistant'">
              <div class="bg-white rounded-2xl shadow-sm border border-slate-200 p-5 prose-container" x-html="m.html"></div>
            </template>
          </div>
        </template>

        <div x-show="streaming" class="bg-white rounded-2xl shadow-sm border border-slate-200 p-5">
          <div x-show="statusText" class="flex items-center gap-2 text-sm text-brand-600 mb-2">
            <span class="inline-block w-2 h-2 rounded-full bg-brand-500 animate-pulse"></span>
            <span x-text="statusText"></span>
          </div>
          <div class="prose-container" x-html="currentHtml"></div>
          <span class="inline-block w-1.5 h-4 bg-brand-500 animate-pulse ml-0.5 align-middle"></span>
        </div>

        <div x-show="loading && !streaming" class="flex items-center gap-2 text-slate-500 text-sm">
          <span class="inline-block w-2 h-2 rounded-full bg-brand-500 animate-pulse"></span>
          <span>Thinking...</span>
        </div>

        <div class="h-32"></div>
      </div>

    </main>

    <!-- ── Floating input (redesigned) ── -->
    <div class="absolute bottom-0 left-0 right-0 z-20 px-4 pb-6 pt-10
                bg-gradient-to-t from-slate-50 via-slate-50/95 to-transparent">
      <div class="max-w-2xl mx-auto">
        {% block input_extra %}{% endblock %}
        <form @submit.prevent="send()"
              class="flex items-center bg-white border border-slate-200 rounded-xl shadow-lg px-3 py-2
                     ring-1 ring-slate-200/60 backdrop-blur-sm">
          <input x-model="input" type="text"
                 placeholder="Ask {{ agent.name }}..."
                 :disabled="loading"
                 class="flex-1 text-sm outline-none bg-transparent placeholder:text-slate-400 disabled:opacity-50 py-1" />
          <button type="submit"
                  :disabled="!input.trim() || loading"
                  class="ml-2 h-8 w-16 rounded-lg bg-brand-800 hover:bg-brand-900
                         disabled:opacity-40 text-white text-sm flex items-center justify-center shrink-0 transition">
            <i data-lucide="send" class="w-3.5 h-3.5"></i>
          </button>
        </form>
        <p class="text-center text-xs text-slate-400 mt-2">
          Mitra Central AI can make mistakes. Please verify critical ERP modifications.
        </p>
      </div>
    </div>

  </div>

</div>
