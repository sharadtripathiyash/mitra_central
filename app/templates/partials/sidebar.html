<!-- ── Collapsible sidebar ─────────────────────────────────────────────────
     Controlled by sidebarOpen in parent Alpine scope.                      -->
<aside class="shrink-0 flex flex-col overflow-hidden"
       :style="sidebarOpen
         ? 'width:220px;opacity:1;transform:translateX(0)'
         : 'width:0;opacity:0;transform:translateX(-8px)'"
       style="transition:width 0.22s ease,opacity 0.18s ease,transform 0.22s ease;
              background:rgba(5,12,30,0.98);border-right:1px solid rgba(0,229,200,0.12)">

  <!-- Nav -->
  <nav class="flex-1 px-3 py-5 overflow-y-auto" style="scrollbar-width:thin;min-width:220px">
    <div style="font-size:9px;font-weight:700;letter-spacing:0.12em;text-transform:uppercase;
                color:rgba(140,180,230,0.3);padding:0 8px 12px 8px">
      AI Agents
    </div>
    {% for a in agents %}
    <a href="{{ a.route_prefix }}"
       style="display:flex;align-items:center;gap:10px;padding:9px 10px;border-radius:10px;
              margin-bottom:2px;font-size:0.875rem;text-decoration:none;transition:all 0.15s;
              white-space:nowrap;
              {% if a.key == active %}
                background:rgba(0,229,200,0.1);border-left:2px solid #00e5c8;
                color:#00e5c8;font-weight:600;padding-left:8px;
              {% else %}
                border-left:2px solid transparent;color:rgba(180,210,255,0.5);
              {% endif %}"
       onmouseover="if('{{ a.key }}' !== '{{ active }}') { this.style.background='rgba(0,229,200,0.06)'; this.style.color='#e8f4ff'; }"
       onmouseout="if('{{ a.key }}' !== '{{ active }}') { this.style.background=''; this.style.color='rgba(180,210,255,0.5)'; }">
      <span>{{ a.name }}</span>
      {% if a.key == active %}
      <span style="margin-left:auto;width:6px;height:6px;background:#00e5c8;border-radius:50%;
                   flex-shrink:0;animation:pulse-dot 2s ease-in-out infinite"></span>
      {% endif %}
    </a>
    {% endfor %}
  </nav>

</aside>

<style>
@keyframes pulse-dot {
  0%, 100% { opacity:1; transform:scale(1); }
  50%       { opacity:0.4; transform:scale(0.6); }
}
</style>
