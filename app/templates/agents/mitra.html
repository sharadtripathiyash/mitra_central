{% extends "base.html" %}
{% block title %}{{ agent.name }} · Apex{% endblock %}
{% block body %}

<div class="h-full flex" x-data="{ sidebarOpen: localStorage.getItem('apex_sb') !== '0' }">

  {% include "partials/sidebar.html" %}

  <div class="flex-1 flex flex-col overflow-hidden min-w-0"
       x-data="mitraAgent('{{ agent.route_prefix }}/ws', '{{ active_domain }}')">
    {% include "partials/chat_shell.html" %}
  </div>
</div>

{% include "partials/apex_widget.html" %}

<script>
function mitraAgent(wsPath, initialDomain) {
  const base = wsChat(wsPath, 'mitra');
  return {
    ...base,
    activeDomain: initialDomain || '{{ default_domain }}',
    domainInput:  '',
    domainOpen:   false,

    init() {
      base.init.call(this);
      this.extraPayload = { domain: this.activeDomain };
      fetch('/agents/mitra/domain', { credentials: 'same-origin' })
        .then(r => r.ok ? r.json() : null)
        .then(d => { if (d?.domain) { this.activeDomain = d.domain; this.extraPayload = { domain: d.domain }; } })
        .catch(() => {});
      document.addEventListener('click', (e) => {
        if (!e.target.closest('[data-mitra-domain]')) this.domainOpen = false;
      });
    },

    setDomain(domain) {
      const d = domain.trim().toUpperCase();
      if (!d) return;
      this.activeDomain = d;
      this.extraPayload = { domain: d };
      this.domainOpen   = false;
      this.domainInput  = '';
      fetch('/agents/mitra/domain', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        credentials: 'same-origin',
        body: JSON.stringify({ domain: d }),
      }).catch(() => {});
    },
  };
}
window.mitraAgent = mitraAgent;
</script>
{% endblock %}
