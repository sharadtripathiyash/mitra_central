{% extends "base.html" %}
{% block title %}Settings · Apex{% endblock %}
{% block body %}
<div class="h-full flex">
  {% include "partials/sidebar.html" %}

  <div class="flex-1 flex flex-col">

    <!-- Header -->
    <header style="height:56px;background:rgba(5,12,30,0.98);border-bottom:1px solid rgba(0,229,200,0.12)"
            class="shrink-0 px-6 flex items-center">
      <div class="flex items-center gap-3">
        <div style="width:36px;height:36px;border-radius:10px;background:rgba(0,229,200,0.1);
                    border:1px solid rgba(0,229,200,0.2)"
             class="flex items-center justify-center">
          <i data-lucide="settings" style="width:18px;height:18px;color:#00e5c8"></i>
        </div>
        <span style="font-family:'Syne',sans-serif;font-weight:700;color:#e8f4ff;font-size:1rem">
          Settings
        </span>
      </div>
    </header>

    <!-- Content -->
    <main class="flex-1 overflow-y-auto px-6 py-8">
      <div style="max-width:480px;margin:0 auto">

        <form method="post" action="/settings"
              style="background:rgba(10,20,42,0.85);border:1px solid rgba(0,229,200,0.14);
                     border-radius:20px;padding:28px;
                     box-shadow:0 20px 60px rgba(0,0,0,0.4),inset 0 1px 0 rgba(0,229,200,0.1);
                     position:relative;overflow:hidden">

          <!-- Top glow line -->
          <div style="position:absolute;top:0;left:0;right:0;height:1px;
                      background:linear-gradient(90deg,transparent,rgba(0,229,200,0.4),transparent)"></div>

          {% if success %}
          <div style="background:rgba(0,229,200,0.1);border:1px solid rgba(0,229,200,0.3);
                      border-radius:10px;padding:10px 14px;font-size:0.85rem;
                      color:#00e5c8;margin-bottom:20px;display:flex;align-items:center;gap:8px">
            <i data-lucide="check-circle" style="width:16px;height:16px"></i>
            Settings saved successfully.
          </div>
          {% endif %}

          <div style="margin-bottom:20px">
            <label style="display:block;font-size:11px;font-weight:600;letter-spacing:0.08em;
                          text-transform:uppercase;color:rgba(180,210,255,0.55);margin-bottom:6px">
              Row limit
            </label>
            <p style="font-size:0.8rem;color:rgba(140,180,230,0.4);margin-bottom:10px">
              Maximum number of rows returned by SQL queries (default: 50).
            </p>
            <input name="row_limit" type="number" min="1" max="500"
                   value="{{ row_limit }}"
                   style="width:100%;background:rgba(5,15,35,0.6);
                          border:1px solid rgba(0,229,200,0.15);border-radius:10px;
                          padding:11px 14px;font-size:0.9rem;color:#e8f4ff;outline:none;
                          transition:border-color 0.2s,box-shadow 0.2s"
                   onfocus="this.style.borderColor='rgba(0,229,200,0.5)';this.style.boxShadow='0 0 0 3px rgba(0,229,200,0.07)'"
                   onblur="this.style.borderColor='rgba(0,229,200,0.15)';this.style.boxShadow='none'" />
          </div>

          <button type="submit"
                  style="width:100%;padding:13px;
                         background:linear-gradient(135deg,#00c9ae 0%,#00e5c8 50%,#0d8ef5 100%);
                         background-size:200% 200%;border:none;border-radius:10px;
                         font-family:'Syne',sans-serif;font-size:0.9rem;font-weight:700;
                         letter-spacing:0.05em;color:#060d1a;cursor:pointer;
                         transition:transform 0.15s,box-shadow 0.2s;
                         box-shadow:0 4px 20px rgba(0,229,200,0.2)"
                  onmouseover="this.style.transform='translateY(-1px)';this.style.boxShadow='0 8px 28px rgba(0,229,200,0.32)'"
                  onmouseout="this.style.transform='';this.style.boxShadow='0 4px 20px rgba(0,229,200,0.2)'">
            Save Settings
          </button>

        </form>

      </div>
    </main>

  </div>
</div>
{% endblock %}
